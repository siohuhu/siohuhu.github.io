<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdfcf9">
<title>Siohuhu Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #fdfcf9;
  --text:   #2a2825;
  --muted:  #9a9590;
  --border: rgba(42,40,37,0.10);
  /* 蘋方黑細體 */
  --sans: 'PingFang TC', 'Apple SD Gothic Neo', 'Noto Sans TC', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', serif;
  min-height: 100svh;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 0;
}

/* ══ HERO ══ */
.hero {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 3 / 4;
  border-radius: 18px;
  overflow: hidden;
  background: #9e9894;
  flex-shrink: 0;
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 20%;
  display: block;
}
.hero::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 35%, rgba(18,16,14,0.62) 100%);
  pointer-events: none;
}

/* 左下 SIOHUHU STUDIO */
.hero-title {
  position: absolute;
  bottom: 18px; left: 18px;
  z-index: 20;
  color: rgba(253,252,249,0.72);
  font-family: 'Georgia', serif;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  line-height: 1.18;
  pointer-events: none;
}
.hero-title .t1,
.hero-title .t2 { font-size: clamp(2rem, 9vw, 2.8rem); }

/* ══ WORKS ══ */
.works { width: 100%; max-width: 420px; margin-top: 16px; }

.work-item {
  display: block; position: relative;
  overflow: hidden; text-decoration: none;
  border-radius: 12px; margin-bottom: 10px;
}
.work-item .work-bg {
  width: 100%; height: 110px;
  object-fit: cover; object-position: center 40%;
  display: block;
  filter: brightness(0.72) saturate(0.88);
  transition: filter 0.4s, transform 0.4s;
}
.work-item:hover .work-bg {
  filter: brightness(0.58) saturate(0.80);
  transform: scale(1.04);
}
.work-item .work-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Georgia', serif; font-weight: 400;
  font-size: clamp(1.7rem, 7vw, 2.2rem);
  letter-spacing: 0.18em;
  color: rgba(253,252,249,0.88);
  text-transform: lowercase;
}

/* ══ BOTTOM BAR（mobile：works 下方）══ */
.bottom-bar {
  width: 100%; max-width: 420px;
  display: flex;
  align-items: center;
  padding: 1.6rem 0 1.2rem;
  border-top: 0.5px solid var(--border);
  margin-top: 4px;
  gap: 16px;
}

.bottom-logo a {
  display: block; text-decoration: none;
  transition: opacity 0.25s;
}
.bottom-logo a:hover { opacity: 0.72; }
.bottom-logo img { height: 40px; width: auto; display: block; }

/* hero-bottom 預設隱藏（mobile 不用）*/
.hero-bottom { display: none; }

/* 分隔線 */
.bottom-divider {
  width: 0.5px; height: 40px;
  background: var(--border);
  flex-shrink: 0;
}

.bottom-contact {}
.bottom-contact .c-label {
  font-family: var(--sans);
  font-size: 0.72rem; font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--text); margin-bottom: 0.25rem;
}
.bottom-contact a {
  font-family: var(--sans);
  font-size: 0.65rem; font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--muted); text-decoration: none;
  display: block; transition: color 0.2s;
}
.bottom-contact a:hover { color: var(--text); }

/* ══ FOOTER ══ */
footer {
  width: 100%; max-width: 420px;
  padding: 0.9rem 0 2.4rem;
  text-align: center;
  font-family: var(--sans);
  font-size: 0.52rem; font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-top: 0.5px solid var(--border);
}

/* ══════════════════
   PC  (≥ 720px)
══════════════════ */
@media (min-width: 720px) {
  body { padding: 40px 40px 0; background: #edeae4; }

  .hero {
    max-width: 1000px; width: 100%;
    aspect-ratio: 16 / 7; border-radius: 20px;
  }

  /* PC：title 移到中間位置，logo+contact 嵌入 hero 左下 */
  .hero-title {
    bottom: 80px; left: 36px;
    letter-spacing: 0.22em;
  }
  .hero-title .t1,
  .hero-title .t2 { font-size: clamp(2.2rem, 3.5vw, 3.6rem); }

  /* PC：hero-bottom 移出 hero，顯示在 works 上方 */
  .hero-bottom {
    position: static;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 1000px;
    padding: 16px 0 0;
  }
  .hero-bottom .hb-logo img { height: 52px; width: auto; display: block; }
  .hero-bottom .hb-logo a {
    display: block; text-decoration: none; transition: opacity 0.25s;
  }
  .hero-bottom .hb-logo a:hover { opacity: 0.72; }
  .hero-bottom .hb-divider {
    width: 0.5px; height: 36px;
    background: var(--border);
    flex-shrink: 0;
  }
  .hero-bottom .hb-contact .c-label {
    font-family: var(--sans);
    font-size: 0.68rem; font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--text);
    margin-bottom: 0.2rem;
  }
  .hero-bottom .hb-contact a {
    font-family: var(--sans);
    font-size: 0.62rem; font-weight: 300;
    color: var(--muted);
    text-decoration: none;
    display: block; transition: color 0.25s;
  }
  .hero-bottom .hb-contact a:hover { color: var(--text); }

  /* mobile bottom-bar 隱藏 */
  .bottom-bar { display: none; }

  .works {
    max-width: 1000px;
    display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap;
  }
  .work-item {
    flex: 1; min-width: 260px;
    margin-bottom: 0; border-radius: 14px;
  }
  .work-item .work-bg { height: 150px; }
  .work-item .work-label { font-size: clamp(1.6rem, 2.8vw, 2.4rem); }

  footer { max-width: 1000px; padding: 1.4rem 0 2rem; }
}

/* 2K */
@media (min-width: 1800px) {
  body { padding: 56px 60px 0; }
  .hero { max-width: 1500px; aspect-ratio: 16 / 6; }
  .hero-title { bottom: 100px; left: 56px; }
  .hero-title .t1, .hero-title .t2 { font-size: clamp(3rem, 3.5vw, 5rem); }
  .hero-bottom { bottom: 28px; left: 56px; }
  .hero-bottom .hb-logo img { height: 64px; }
  .works { max-width: 1500px; gap: 20px; }
  .work-item .work-bg { height: 200px; }
  .work-item .work-label { font-size: clamp(2rem, 2.5vw, 3rem); }
  footer { max-width: 1500px; font-size: 0.60rem; }
}
</style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <img class="hero-img" src="siohuhustudio_home.png" alt="Siohuhu Studio">

    <div class="hero-title" aria-hidden="true">
      <div class="t1">SIOHUHU</div>
      <div class="t2">STUDIO</div>
    </div>

  </section>

  <!-- PC：logo + contact，hero 下方 -->
  <div class="hero-bottom">
    <div class="hb-logo">
      <a href="/" aria-label="Siohuhu Studio">
        <img src="siohuhu_logo_02.png" alt="Siohuhu Studio">
      </a>
    </div>
    <div class="hb-divider"></div>
    <div class="hb-contact">
      <p class="c-label">contact</p>
      <a href="mailto:siohuhu.studio@gmail.com">siohuhu.studio@gmail.com</a>
    </div>
  </div>

  <!-- WORKS -->
  <div class="works">
    <a class="work-item" href="https://siohuhu.github.io/sea-of-mirrors/" target="_blank" rel="noopener">
      <img class="work-bg" src="siohuhustudio_home02.png" alt="Sea of Mirrors 鏡之海">
      <span class="work-label">sea of mirrors</span>
    </a>
  </div>

  <!-- MOBILE：works 下方 logo + contact -->
  <div class="bottom-bar">
    <div class="bottom-logo">
      <a href="/" aria-label="Siohuhu Studio">
        <img src="siohuhu_logo_02.png" alt="Siohuhu Studio">
      </a>
    </div>
    <div class="bottom-divider"></div>
    <div class="bottom-contact">
      <p class="c-label">contact</p>
      <a href="mailto:siohuhu.studio@gmail.com">siohuhu.studio@gmail.com</a>
    </div>
  </div>

  <footer>All rights reserved 2026 by The Siohuhu.Studio</footer>

</body>
</html>
