<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdfcf9">
<title>Siohuhu Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdfcf9;
    --text: #2a2825;
    --muted: #9a9590;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100svh;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1.05;
    max-height: 540px;
    overflow: hidden;
    background: #9e9894;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* 底部漸層 */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 35%,
      rgba(22,20,18,0.45) 100%
    );
    pointer-events: none;
  }

  /* 右上 logo */
  .hero-logo {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
  }

  .hero-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 左下大字 */
  .hero-title {
    position: absolute;
    bottom: 22px;
    left: 20px;
    z-index: 10;
    color: rgba(253,252,249,0.72);
    font-family: 'Georgia', serif;
    font-weight: 400;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    line-height: 1.18;
  }

  .hero-title .t1 { font-size: clamp(1.9rem, 8vw, 3rem); }
  .hero-title .t2 { font-size: clamp(1.9rem, 8vw, 3rem); }

  /* ── WORKS ── */
  .works { width: 100%; }

  .work-item {
    display: block;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    border-bottom: 0.5px solid rgba(42,40,37,0.10);
  }

  .work-item .work-bg {
    width: 100%;
    height: 110px;
    object-fit: cover;
    object-position: center 40%;
    display: block;
    filter: brightness(0.78) saturate(0.85);
    transition: filter 0.4s ease, transform 0.4s ease;
  }

  .work-item:hover .work-bg {
    filter: brightness(0.65) saturate(0.8);
    transform: scale(1.03);
  }

  .work-item .work-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 0.22em;
    color: rgba(253,252,249,0.86);
    text-transform: lowercase;
  }

  /* ── CONTACT ── */
  .contact {
    padding: 2.6rem 1.5rem 1.8rem;
    text-align: center;
    border-bottom: 0.5px solid rgba(42,40,37,0.08);
  }

  .contact .c-label {
    font-size: 0.80rem;
    letter-spacing: 0.18em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .contact a {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact a:hover { color: var(--text); }

  /* ── FOOTER ── */
  footer {
    padding: 1.4rem 1.5rem 2rem;
    text-align: center;
    font-size: 0.58rem;
    letter-spacing: 0.10em;
    color: var(--muted);
  }

  /* 桌機：像手機 mockup 置中 */
  @media (min-width: 600px) {
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #e8e4dc;
    }

    .page-wrap {
      width: 100%;
      max-width: 420px;
      background: var(--bg);
      box-shadow: 0 2px 80px rgba(0,0,0,0.12);
      min-height: 100svh;
    }

    .hero {
      aspect-ratio: unset;
      height: 280px;
      max-height: 280px;
    }
  }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- HERO：換成你的主視覺插圖 -->
  <section class="hero">
    <img class="hero-img" src="siohuhustudio_home.png" alt="Siohuhu Studio">
    <div class="hero-logo">
      <img src="siohuhu_logo.png" alt="Siohuhu Studio">
    </div>
    <div class="hero-title">
      <div class="t1">SIOHUHU</div>
      <div class="t2">STUDIO</div>
    </div>
  </section>

  <!-- WORKS：每個作品各自用自己的封面圖 -->
  <div class="works">

    <a class="work-item" href="https://www.siohuhu.studio/" target="_blank">
      <!-- sea of mirrors 用第二張圖做封面 -->
      <img class="work-bg" src="siohuhustudio_home02.png" alt="sea of mirrors">
      <span class="work-label">sea of mirrors</span>
    </a>

    <!-- 未來作品：複製整個 <a> 區塊，換 href / src / label -->
    <!--
    <a class="work-item" href="#" target="_blank">
      <img class="work-bg" src="NEXT_COVER.png" alt="next work">
      <span class="work-label">next work</span>
    </a>
    -->

  </div>

  <div class="contact">
    <p class="c-label">contact</p>
    <a href="mailto:siohuhu.studio@gmail.com">siohuhu.studio@gmail.com</a>
  </div>

  <footer>All rights reserved 2026 by The Siohuhu.Studio</footer>

</div>

</body>
</html>
