<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdfcf9">
<meta name="description" content="Siohuhu Studio — independent game & interactive design studio">
<title>Siohuhu Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #fdfcf9;
  --text:     #2a2825;
  --muted:    #9a9590;
  --border:   rgba(42,40,37,0.10);
  --hero-h-mobile: 100svh;
  --hero-h-pc:     100vh;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
}

/* ════════════════════════════════
   MOBILE FIRST  (< 720px)
   全滿直式，mobile_home 參考圖
════════════════════════════════ */

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: var(--hero-h-mobile);
  overflow: hidden;
  background: #9e9894;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

/* 底漸層 */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 40%,
    rgba(18,16,14,0.50) 100%
  );
  pointer-events: none;
}

/* 右上 logo — 可點擊回首頁 */
.hero-logo {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 20;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: hidden;
  display: block;
  text-decoration: none;
  transition: opacity 0.25s;
  background: #0a0a0a;
}
.hero-logo:hover { opacity: 0.80; }
.hero-logo img {
  width: 150%;
  height: 75%;
  object-fit: cover;
  object-position: center 20%;
  margin-left: -25%;
  margin-top: 12%;
}

/* 左下大字 */
.hero-title {
  position: absolute;
  bottom: 28px;
  left: 22px;
  z-index: 20;
  color: rgba(253,252,249,0.72);
  font-family: 'Georgia', serif;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  line-height: 1.16;
  pointer-events: none;
}
.hero-title .t1,
.hero-title .t2 { font-size: clamp(2rem, 9vw, 3.2rem); }

/* WORKS */
.works { width: 100%; }

.work-item {
  display: block;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  border-bottom: 0.5px solid var(--border);
}

.work-item .work-bg {
  width: 100%;
  height: 110px;
  object-fit: cover;
  object-position: center 40%;
  display: block;
  filter: brightness(0.78) saturate(0.88);
  transition: filter 0.4s, transform 0.4s;
}
.work-item:hover .work-bg {
  filter: brightness(0.62) saturate(0.80);
  transform: scale(1.04);
}

.work-item .work-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Georgia', serif;
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.22em;
  color: rgba(253,252,249,0.88);
  text-transform: lowercase;
}

/* CONTACT */
.contact {
  padding: 2.6rem 1.5rem 1.8rem;
  text-align: center;
  border-bottom: 0.5px solid var(--border);
}
.contact .c-label {
  font-size: 0.80rem;
  letter-spacing: 0.18em;
  color: var(--text);
  margin-bottom: 0.4rem;
}
.contact a {
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-decoration: none;
  display: block;
  transition: color 0.2s;
}
.contact a:hover { color: var(--text); }

/* FOOTER */
footer {
  padding: 1.4rem 1.5rem 2.4rem;
  text-align: center;
  font-size: 0.58rem;
  letter-spacing: 0.10em;
  color: var(--muted);
}

/* ════════════════════════════════
   PC / WIDE  (≥ 720px)
   全寬 hero，卡片置中限寬，2K OK
════════════════════════════════ */
@media (min-width: 720px) {
  body { background: var(--bg); }

  /* Hero 全寬，高度 100vh */
  .hero {
    height: var(--hero-h-pc);
    max-height: none;
  }

  /* logo 放大一點 */
  .hero-logo {
    width: 68px;
    height: 68px;
    top: 20px;
    right: 28px;
  }

  /* 大字跟隨視口 */
  .hero-title {
    bottom: 40px;
    left: 48px;
    letter-spacing: 0.26em;
  }
  .hero-title .t1,
  .hero-title .t2 { font-size: clamp(3rem, 6vw, 6rem); }

  /* Works：置中、限寬卡片 */
  .works {
    display: flex;
    justify-content: center;
    padding: 56px 0 48px;
    gap: 24px;
    background: var(--bg);
    flex-wrap: wrap;
  }

  .work-item {
    width: 320px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }

  .work-item .work-bg {
    height: 180px;
    object-position: center 40%;
  }

  .work-item .work-label {
    font-size: 0.88rem;
  }

  /* Contact */
  .contact { padding: 2.8rem 2rem 2rem; }
  .contact .c-label { font-size: 0.85rem; }
  .contact a { font-size: 0.78rem; }

  footer { padding: 1.6rem 2rem 3rem; font-size: 0.62rem; }
}

/* 2K (≥ 1800px) — 字更大，卡片間距更開 */
@media (min-width: 1800px) {
  .hero-title .t1,
  .hero-title .t2 { font-size: clamp(5rem, 5.5vw, 8rem); }

  .hero-logo { width: 88px; height: 88px; top: 28px; right: 40px; }

  .works { gap: 36px; padding: 80px 0 64px; }
  .work-item { width: 420px; }
  .work-item .work-bg { height: 240px; }
  .work-item .work-label { font-size: 1.1rem; }

  .contact .c-label { font-size: 1rem; }
  .contact a { font-size: 0.9rem; }
  footer { font-size: 0.72rem; }
}
</style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <img class="hero-img" src="siohuhustudio_home.png" alt="Siohuhu Studio">

    <!-- logo = 回首頁連結，部署後把 href 改成你的 studio URL -->
    <a class="hero-logo" href="/" aria-label="Siohuhu Studio — 回首頁">
      <img src="siohuhu_logo.png" alt="Siohuhu Studio logo">
    </a>

    <div class="hero-title" aria-hidden="true">
      <div class="t1">SIOHUHU</div>
      <div class="t2">STUDIO</div>
    </div>
  </section>

  <!-- WORKS -->
  <div class="works">

    <a class="work-item" href="https://siohuhu.github.io/sea-of-mirrors/" target="_blank" rel="noopener">
      <img class="work-bg" src="siohuhustudio_home02.png" alt="Sea of Mirrors 鏡之海">
      <span class="work-label">sea of mirrors</span>
    </a>

    <!-- 未來作品：複製 work-item 區塊，換 href / src / label -->
    <!--
    <a class="work-item" href="#" target="_blank" rel="noopener">
      <img class="work-bg" src="NEXT_COVER.png" alt="next work">
      <span class="work-label">next work</span>
    </a>
    -->

  </div>

  <!-- CONTACT -->
  <div class="contact">
    <p class="c-label">contact</p>
    <a href="mailto:siohuhu.studio@gmail.com">siohuhu.studio@gmail.com</a>
  </div>

  <!-- FOOTER -->
  <footer>All rights reserved 2026 by The Siohuhu.Studio</footer>

</body>
</html>
