<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdfcf9">
<meta name="description" content="Siohuhu Studio — independent game & interactive design studio">
<title>Siohuhu Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #fdfcf9;
  --text:  #2a2825;
  --muted: #9a9590;
  --border: rgba(42,40,37,0.10);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  min-height: 100svh;
}

/* ════════════════════════════
   MOBILE  (< 720px)
   參考 siohuhu_home_mobile.png
   圖片有上下留白，非全滿
════════════════════════════ */

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 20px 0;
  background: var(--bg);
}

/* HERO — 圓角卡片，非全滿 */
.hero {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 3 / 4;
  border-radius: 16px;
  overflow: hidden;
  background: #9e9894;
  flex-shrink: 0;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

/* 底漸層 */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 40%,
    rgba(18,16,14,0.55) 100%
  );
  pointer-events: none;
}

/* 右上 logo */
.hero-logo {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 20;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  overflow: hidden;
  display: block;
  text-decoration: none;
  transition: opacity 0.25s;
}
.hero-logo:hover { opacity: 0.80; }
/* logo 圖是黑底，雙圓圈在中間，用 scale + translate 裁出來 */
.hero-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 38%;
  transform: scale(1.35);
}

/* 左下大字 */
.hero-title {
  position: absolute;
  bottom: 22px;
  left: 20px;
  z-index: 20;
  color: rgba(253,252,249,0.72);
  font-family: 'Georgia', serif;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  line-height: 1.16;
  pointer-events: none;
}
.hero-title .t1,
.hero-title .t2 { font-size: clamp(1.8rem, 8vw, 2.6rem); }

/* WORKS — 全寬條狀 */
.works {
  width: 100%;
  max-width: 420px;
  margin-top: 20px;
}

.work-item {
  display: block;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  border-radius: 12px;
  margin-bottom: 12px;
}

.work-item .work-bg {
  width: 100%;
  height: 110px;
  object-fit: cover;
  object-position: center 40%;
  display: block;
  filter: brightness(0.75) saturate(0.88);
  transition: filter 0.4s, transform 0.4s;
}
.work-item:hover .work-bg {
  filter: brightness(0.60) saturate(0.80);
  transform: scale(1.04);
}

/* ★ work label 字放大 2.5x，原 1rem → 2.5rem */
.work-item .work-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Georgia', serif;
  font-weight: 400;
  font-size: 2.5rem;
  letter-spacing: 0.18em;
  color: rgba(253,252,249,0.88);
  text-transform: lowercase;
}

/* CONTACT */
.contact {
  width: 100%;
  max-width: 420px;
  padding: 2rem 0 1.4rem;
  text-align: center;
  border-top: 0.5px solid var(--border);
  margin-top: 8px;
}
.contact .c-label {
  font-size: 0.80rem;
  letter-spacing: 0.18em;
  color: var(--text);
  margin-bottom: 0.35rem;
}
.contact a {
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-decoration: none;
  display: block;
  transition: color 0.2s;
}
.contact a:hover { color: var(--text); }

/* FOOTER */
footer {
  width: 100%;
  max-width: 420px;
  padding: 1rem 0 2.4rem;
  text-align: center;
  font-size: 0.56rem;
  letter-spacing: 0.10em;
  color: var(--muted);
  border-top: 0.5px solid var(--border);
}

/* ════════════════════════════
   PC  (≥ 720px)
   參考 im01.png：
   hero 左右留白，置中，非全滿
════════════════════════════ */
@media (min-width: 720px) {
  body {
    padding: 48px 40px 0;
    background: #edeae4;
    align-items: center;
  }

  .hero {
    max-width: 860px;
    width: 100%;
    aspect-ratio: 16 / 7;
    border-radius: 20px;
  }

  .hero-logo {
    width: 64px;
    height: 64px;
    top: 18px;
    right: 18px;
  }

  .hero-title {
    bottom: 32px;
    left: 40px;
    letter-spacing: 0.24em;
  }
  .hero-title .t1,
  .hero-title .t2 { font-size: clamp(2.8rem, 5vw, 5rem); }

  .works {
    max-width: 860px;
    display: flex;
    gap: 16px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .work-item {
    flex: 1;
    min-width: 280px;
    margin-bottom: 0;
    border-radius: 14px;
  }

  .work-item .work-bg { height: 160px; }

  .work-item .work-label { font-size: 2.5rem; }

  .contact {
    max-width: 860px;
    padding: 2.2rem 0 1.6rem;
  }

  footer { max-width: 860px; }
}

/* 2K (≥ 1800px) */
@media (min-width: 1800px) {
  body { padding: 64px 60px 0; }

  .hero {
    max-width: 1400px;
    aspect-ratio: 16 / 6;
  }

  .hero-logo { width: 80px; height: 80px; top: 24px; right: 24px; }

  .hero-title .t1,
  .hero-title .t2 { font-size: clamp(4rem, 5vw, 7rem); }

  .works { max-width: 1400px; gap: 24px; }
  .work-item .work-bg { height: 220px; }
  .work-item .work-label { font-size: 3rem; }

  .contact { max-width: 1400px; }
  footer { max-width: 1400px; font-size: 0.65rem; }
}
</style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <img class="hero-img" src="siohuhustudio_home.png" alt="Siohuhu Studio">
    <a class="hero-logo" href="/" aria-label="Siohuhu Studio">
      <img src="siohuhu_logo.png" alt="Siohuhu Studio logo">
    </a>
    <div class="hero-title" aria-hidden="true">
      <div class="t1">SIOHUHU</div>
      <div class="t2">STUDIO</div>
    </div>
  </section>

  <!-- WORKS -->
  <div class="works">
    <a class="work-item" href="https://siohuhu.github.io/sea-of-mirrors/" target="_blank" rel="noopener">
      <img class="work-bg" src="siohuhustudio_home02.png" alt="Sea of Mirrors 鏡之海">
      <span class="work-label">sea of mirrors</span>
    </a>
    <!--
    <a class="work-item" href="#" target="_blank" rel="noopener">
      <img class="work-bg" src="NEXT_COVER.png" alt="next work">
      <span class="work-label">next work</span>
    </a>
    -->
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <p class="c-label">contact</p>
    <a href="mailto:siohuhu.studio@gmail.com">siohuhu.studio@gmail.com</a>
  </div>

  <!-- FOOTER -->
  <footer>All rights reserved 2026 by The Siohuhu.Studio</footer>

</body>
</html>
